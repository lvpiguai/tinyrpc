syntax = "proto3";

package tinyrpc;

option cc_generic_services  = true;

// Add 请求
message AddRequest {
    int32 a = 1;
    int32 b = 2;
}

// Add 响应
message AddResponse {
    int32 result = 1;
}

// Sub 请求
message SubRequest {
  int32 a = 1;
  int32 b = 2;
}

// Sub 响应
message SubResponse {
  int32 result = 1;
}

// 计算器服务
service CalculatorService{
    rpc Add(AddRequest) returns (AddResponse);
    rpc Sub(SubRequest) returns (SubResponse);
}
